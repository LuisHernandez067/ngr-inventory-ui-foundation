name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- Lint: ESLint + Prettier ---
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar formato con Prettier
        run: npm run format:check

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Ejecutar Stylelint
        run: npm run stylelint

  # --- Typecheck: tsc --noEmit ---
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npm run typecheck

  # --- Build: Vite build del prototipo ---
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build del prototipo
        run: npm run build

  # --- Tests unitarios: Vitest ---
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests unitarios con cobertura
        run: npm run test:coverage

  # --- Storybook build: verifica que el design system compila ---
  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build de Storybook
        run: npm run storybook:build

  # --- E2E: Playwright Chromium headless ---
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build, test]
    defaults:
      run:
        working-directory: apps/prototype-shell
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci
        working-directory: .

      - name: Instalar Chromium para Playwright
        run: npx playwright install chromium --with-deps

      - name: Ejecutar tests E2E (Chromium)
        run: npx playwright test --project=chromium

      - name: Subir reporte de Playwright
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/prototype-shell/playwright-report/
          retention-days: 7
